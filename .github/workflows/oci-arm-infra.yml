name: OCI ARM Infra

# Checks out the PRIVATE valuepenny repo's Terraform code.
# Plan on PR, apply on push to main (requires production environment approval).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  TF_VERSION: "1.9.0"
  WORKING_DIR: infra/opentofu

  TF_VAR_tenancy_ocid:        ${{ secrets.OCI_TENANCY_OCID }}
  TF_VAR_user_ocid:           ${{ secrets.OCI_USER_OCID }}
  TF_VAR_fingerprint:         ${{ secrets.OCI_FINGERPRINT }}
  TF_VAR_private_key:         ${{ secrets.OCI_PRIVATE_KEY }}
  TF_VAR_region:              ${{ vars.OCI_REGION }}
  TF_VAR_compartment_id:      ${{ secrets.OCI_COMPARTMENT_ID }}
  TF_VAR_ssh_public_key:      ${{ secrets.VM_SSH_PUBLIC_KEY }}

  AWS_ACCESS_KEY_ID:     ${{ secrets.OCI_STATE_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_STATE_SECRET_KEY }}

jobs:
  # ---------------------------------------------------------------------------
  # plan — runs on PRs and all events (always useful to see what will change)
  # ---------------------------------------------------------------------------
  plan:
    name: tofu plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private valuepenny repo
        uses: actions/checkout@v5
        with:
          repository: csscientist/valuepenny
          ref: amazon
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Install OCI CLI
        run: |
          curl -sL https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh | \
            bash -s -- --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ vars.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "${OCI_PRIVATE_KEY}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          key_file=~/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: tofu init
        working-directory: ${{ env.WORKING_DIR }}
        run: tofu init -input=false -upgrade

      - name: tofu plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          AD=$(oci iam availability-domain list \
            --compartment-id "${OCI_COMPARTMENT_ID}" \
            --query 'data[0].name' \
            --raw-output 2>/dev/null | tr -d '\r\n')

          TF_VAR_availability_domain="${AD}" \
          TF_VAR_worker_availability_domain="${AD}" \
          tofu plan -input=false -no-color -out=tfplan.binary 2>&1 | tee plan-raw.txt

      - name: Write plan to Job Summary
        if: always()
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          tofu show -no-color tfplan.binary > tfplan.txt 2>/dev/null || true
          OUTCOME="${{ steps.plan.outcome }}"
          EMOJI=$([[ "$OUTCOME" == "success" ]] && echo "✅" || echo "❌")

          echo "## ${EMOJI} OpenTofu Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Show full plan</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          head -c 60000 tfplan.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || head -c 60000 plan-raw.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------------
  # apply — runs on push to main or workflow_dispatch, requires approval
  # ---------------------------------------------------------------------------
  apply:
    name: tofu apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout private valuepenny repo
        uses: actions/checkout@v5
        with:
          repository: csscientist/valuepenny
          ref: amazon
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: ${{ env.TF_VERSION }}

      - name: Install OCI CLI
        run: |
          curl -sL https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh | \
            bash -s -- --accept-all-defaults
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure OCI CLI
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ vars.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "${OCI_PRIVATE_KEY}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          key_file=~/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: tofu init
        working-directory: ${{ env.WORKING_DIR }}
        run: tofu init -input=false -upgrade

      - name: tofu apply across all ADs
        id: apply
        working-directory: ${{ env.WORKING_DIR }}
        env:
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          ADS=$(oci iam availability-domain list \
            --compartment-id "${OCI_COMPARTMENT_ID}" \
            --query 'data[].name' \
            --raw-output 2>/dev/null | tr -d '[]",' | tr ' ' '\n' | grep -v '^$')

          echo "ADs to try: ${ADS}"
          SUCCEEDED="false"

          for AD in ${ADS}; do
            AD=$(printf '%s' "${AD}" | tr -d '\r\n ')
            echo "============================================"
            echo "Trying AD: ${AD}"
            echo "============================================"

            if TF_VAR_availability_domain="${AD}" \
               TF_VAR_worker_availability_domain="${AD}" \
               tofu apply -input=false -auto-approve 2>&1; then
              echo "✅ Apply succeeded in AD: ${AD}!"
              SUCCEEDED="true"
              echo "succeeded=true" >> "$GITHUB_OUTPUT"
              echo "ad=${AD}" >> "$GITHUB_OUTPUT"
              break
            else
              echo "❌ Failed in AD: ${AD} — trying next..."
            fi
          done

          if [[ "${SUCCEEDED}" != "true" ]]; then
            echo "❌ No capacity in any AD."
            echo "succeeded=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Write outputs to Job Summary
        if: always()
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "## 🚀 OpenTofu Apply" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.apply.outputs.succeeded }}" == "true" ]]; then
            echo "Availability Domain: \`${{ steps.apply.outputs.ad }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          tofu output 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No outputs (apply may have failed)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

